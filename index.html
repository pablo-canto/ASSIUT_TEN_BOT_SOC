<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .field { margin-bottom: 12px; }
        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .row .field { flex: 1; margin-bottom: 0; }
        /* Ajuste de proporciones para Badge vs Name */
        .flex-small { flex: 0.5 !important; }
        .flex-large { flex: 1.5 !important; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        select, input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; background-color: white; color: black; }
        .error { border: 2px solid #ff4d4d !important; }
        button { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Safety Observation Card</h3>

    <div class="row">
        <div class="field">
            <label>Date:</label>
            <input type="date" id="date">
        </div>
        <div class="field">
            <label>Company:</label>
            <select id="company">
                <option value="">Select Company...</option>
                <option value="TEN">TECHNIP ENERGIES</option>
                <option value="PTJ">PETROJET</option>
                <option value="ENPPI">ENPPI</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="field flex-small">
            <label>Badge Number:</label>
            <input type="text" id="badge" placeholder="ID" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>
        <div class="field flex-large">
            <label>Name:</label>
            <input type="text" id="name" placeholder="Full Name" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
        </div>
    </div>

    <div class="field">
        <label>Area (Searchable):</label>
        <input list="areaOptions" id="area" placeholder="Type to search area...">
        <datalist id="areaOptions">
            <option value="ADMIN BUILDING">
            <option value="1GXX - AREA G - UTILITY AREA">
            <option value="ENPPI LAYDOWN 1">
            <option value="ENPPI LAYDOWN A3 - WAREHOUSE">
            <option value="GATE 01">
            <option value="GATE 02">
            <option value="GATE 06">
            <option value="GATE 07">
            <option value="GATE 13">
            <option value="GATE 15">
            <option value="SUBSTATION 1B01">
            <option value="SUBSTATION 1C01">
            <option value="SUBSTATION 1D01">
            <option value="SUBSTATION 1E01">
            <option value="SUBSTATION 1G01">
            <option value="SUBSTATION 1Q01">
            <option value="TECHNIP ACCOMMODATION">
            <option value="TEN LAYDOWN 1">
            <option value="TEN LAYDOWN 2">
            <option value="TEN LAYDOWN 3">
            <option value="TEN LAYDOWN 4">
            <option value="TEN WAREHOUSE">
            <option value="TOP OFFICE">
            <option value="UNIT 01 - VDU">
            <option value="UNIT 02 - DHTU">
            <option value="UNIT 03 - HCKU">
            <option value="UNIT 04 - HPU">
            <option value="UNIT 05 - DCU">
            <option value="UNIT 09 - ARU">
            <option value="UNIT 10 - SWSU">
            <option value="UNIT 11 - SRU&TGTU">
            <option value="UNIT 33 - CWU">
            <option value="UNIT 43 - CAU">
            <option value="UNIT 50 - FLAU">
            <option value="UNIT 52 - Waste Water">
            <option value="UNIT 54 - SSU">
            <option value="UNIT 58 - RIU">
            <option value="UNIT 59 - RIP">
            <option value="UNIT 63 - INU">
            <option value="ZONE 1">
            <option value="ZONE 2">
            <option value="ZONE 3">
            <option value="ZONE 4">
        </datalist>
    </div>

    <div class="field">
        <label>Observed Company:</label>
        <select id="obsCompany">
            <option value="">Select Observed Company...</option>
            <option value="TEN">TECHNIP ENERGIES</option>
            <option value="PTJ">PETROJET</option>
            <option value="ENPPI">ENPPI</option>
            <option value="OTHER">OTHER</option>
        </select>
    </div>

    <div class="row">
        <div class="field">
            <label>Type of Observation:</label>
            <select id="obsType">
                <option value="">Select Type...</option>
                <option value="Safe">Safe</option>
                <option value="Unsafe Condition">Unsafe Condition</option>
                <option value="Unsafe Act">Unsafe Act</option>
                <option value="Near Miss">Near Miss</option>
            </select>
        </div>
        <div class="field">
            <label>HSE Category (Searchable):</label>
            <input list="categoryOptions" id="hseCategory" placeholder="Search category...">
            <datalist id="categoryOptions">
                <option value="Access">
                <option value="Barricades">
                <option value="Cable Management">
                <option value="Chemical MSDS">
                <option value="Competency / Training">
                <option value="Confined Space">
                <option value="Drinking Water">
                <option value="Dropped Objects">
                <option value="Dust control">
                <option value="Electricity">
		        <option value="Emergency">
		        <option value="Environmental Issue">	
        		<option value="Excavations/trenching">
        		<option value="Fire Equipment">
        		<option value="Gas Cylinders">
        		<option value="Hand Tools">
        		<option value="Hazardous Waste">
        		<option value="Housekeeping">
        		<option value="HSE Sign">
        		<option value="Impalement Hazard">
        		<option value="Inspection & Color Code">
        		<option value="Lifting rigging">
        		<option value="Manual Handling">
        		<option value="Material Management">
        		<option value="MEWP">
        		<option value="Noise">
        		<option value="Permit to Work">
        		<option value="Position of People">
        		<option value="PPE">
        		<option value="Slip/trips">
        		<option value="Smoking policy">
        		<option value="TBT">
        		<option value="Tools & Equipment">
        		<option value="Traffic Violation">
        		<option value="Vehicles/Equip. Operations">
        		<option value="Welfare facilities">
        		<option value="Work at Height / Scaffoldings">
            </datalist>
        </div>
    </div>

    <div class="field">
        <label>Observation:</label>
        <textarea id="observation" rows="3" placeholder="Describe what you observed..."></textarea>
    </div>

    <button id="mainButton" onclick="sendData()">Save Observation</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const dateInput = document.getElementById('date');
        const now = new Date();
        const today = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        
        const minDateObj = new Date();
        minDateObj.setDate(minDateObj.getDate() - 15);
        const minDate = new Date(minDateObj.getTime() - (minDateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];

        dateInput.setAttribute('max', today);
        dateInput.setAttribute('min', minDate);

        function sendData() {
            const fields = [
                { id: 'date', label: 'Date' },
                { id: 'company', label: 'Company' },
                { id: 'badge', label: 'Badge Number' },
                { id: 'name', label: 'Name' },
                { id: 'area', label: 'Area' },
                { id: 'obsCompany', label: 'Observed Company' },
                { id: 'obsType', label: 'Type of Observation' },
                { id: 'hseCategory', label: 'HSE Category' },
                { id: 'observation', label: 'Observation' }
            ];

            let errors = [];
            let values = [];

            fields.forEach(field => {
                const element = document.getElementById(field.id);
                const val = element.value.trim();

                if (!val) {
                    element.classList.add('error');
                    errors.push(`- ${field.label} is required.`);
                } else if (field.id === 'date') {
                    if (val > today) {
                        element.classList.add('error');
                        errors.push("- Date cannot be in the future.");
                    } else if (val < minDate) {
                        element.classList.add('error');
                        errors.push("- Date cannot be older than 15 days.");
                    } else {
                        element.classList.remove('error');
                        values.push(val);
                    }
                } else {
                    element.classList.remove('error');
                    values.push(val);
                }
            });

            if (errors.length > 0) {
                tg.showAlert("Validation errors:\n" + errors.join("\n"));
                return;
            }

            tg.sendData(values.join(","));
        }
    </script>
</body>
</html>
